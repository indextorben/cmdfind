name: Continuous Desktop Packages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-packages:
    name: Build ${{ matrix.target }} package
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            artifact_name: cmdfind-linux
            package_globs: |
              release/linux/*.AppImage
              release/linux/*.deb
              release/linux/*.tar.gz
          - os: windows-latest
            target: win
            artifact_name: cmdfind-windows
            package_globs: |
              release/win/*.exe
              release/win/*.zip
          - os: macos-latest
            target: mac
            artifact_name: cmdfind-macos
            package_globs: |
              release/mac/*.dmg
              release/mac/*.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Linux packaging dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libfuse2t64 || sudo apt-get install -y --no-install-recommends libfuse2

      - name: Build app
        run: npm run build

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w node-pty

      - name: Package desktop app
        run: npx electron-builder --publish never --${{ matrix.target }} --config.directories.output=release/${{ matrix.target }}

      - name: Upload package artifacts
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.package_globs }}
          if-no-files-found: error

  publish-release:
    name: Publish continuous release
    runs-on: ubuntu-latest
    needs: build-packages

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: cmdfind-*
          merge-multiple: true
          path: release-assets

      - name: Ensure continuous release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view continuous >/dev/null 2>&1 || gh release create continuous \
            --title "cmdfind Continuous Desktop Build" \
            --notes "Auto-generated desktop packages." \
            --prerelease

      - name: Update release metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit continuous \
            --title "cmdfind Continuous Desktop Build" \
            --notes "Auto-generated desktop packages from commit ${{ github.sha }}. Updated on every push to main." \
            --prerelease

      - name: Upload assets to continuous release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -d '' files < <(find release-assets -type f -print0)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No release assets found to upload."
            exit 1
          fi
          gh release upload continuous "${files[@]}" --clobber
