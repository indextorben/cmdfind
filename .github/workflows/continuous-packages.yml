name: Continuous Desktop Packages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CONTINUOUS_VERSION: 0.1.${{ github.run_number }}

jobs:
  build-packages:
    name: Build ${{ matrix.target }} package
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            artifact_name: cmdfind-linux
            package_globs: |
              release/linux/*.AppImage
              release/linux/*.deb
              release/linux/*.tar.gz
              release/linux/latest-linux.yml
          - os: windows-latest
            target: win
            artifact_name: cmdfind-windows
            package_globs: |
              release/win/*.exe
              release/win/*.zip
              release/win/*.blockmap
              release/win/latest.yml
          - os: macos-latest
            target: mac
            artifact_name: cmdfind-macos
            package_globs: |
              release/mac/*.dmg
              release/mac/*.zip
              release/mac/*.blockmap
              release/mac/latest-mac.yml

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Linux packaging dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libfuse2t64 || sudo apt-get install -y --no-install-recommends libfuse2

      - name: Build app
        run: npm run build

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w node-pty

      - name: Prepare Apple notarization credentials
        if: matrix.target == 'mac'
        shell: bash
        run: |
          if [ -n "${{ secrets.APPLE_API_KEY_P8 }}" ] && [ -n "${{ secrets.APPLE_API_KEY_ID }}" ] && [ -n "${{ secrets.APPLE_API_ISSUER }}" ]; then
            echo "Using App Store Connect API key for notarization."
            key_file="$RUNNER_TEMP/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"
            printf '%s' "${{ secrets.APPLE_API_KEY_P8 }}" > "$key_file"
            chmod 600 "$key_file"
            {
              echo "APPLE_API_KEY=$key_file"
              echo "APPLE_API_KEY_ID=${{ secrets.APPLE_API_KEY_ID }}"
              echo "APPLE_API_ISSUER=${{ secrets.APPLE_API_ISSUER }}"
              echo "APPLE_ID="
              echo "APPLE_APP_SPECIFIC_PASSWORD="
            } >> "$GITHUB_ENV"
          else
            echo "Using APPLE_ID + app-specific password for notarization."
            {
              echo "APPLE_ID=${{ secrets.APPLE_ID }}"
              echo "APPLE_APP_SPECIFIC_PASSWORD=${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"
            } >> "$GITHUB_ENV"
          fi
          echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}" >> "$GITHUB_ENV"

      - name: Package desktop app
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: "true"
          APPLE_ID: ${{ env.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ env.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ env.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ env.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ env.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ env.APPLE_API_ISSUER }}
        run: npx electron-builder --publish never --${{ matrix.target }} --config.directories.output=release/${{ matrix.target }} --config.extraMetadata.version=${{ env.CONTINUOUS_VERSION }}

      - name: Upload package artifacts
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.package_globs }}
          if-no-files-found: error

  publish-release:
    name: Publish continuous release
    runs-on: ubuntu-latest
    needs: build-packages
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: cmdfind-*
          merge-multiple: true
          path: release-assets

      - name: Debug token permissions
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Repository: ${{ github.repository }}"
          gh api repos/${{ github.repository }} -q '.permissions'

      - name: Ensure continuous release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view continuous -R ${{ github.repository }} >/dev/null 2>&1 || gh release create continuous -R ${{ github.repository }} \
            --title "cmdfind Continuous Desktop Build" \
            --notes "Auto-generated desktop packages." \
            --prerelease

      - name: Update release metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit continuous -R ${{ github.repository }} \
            --title "cmdfind Continuous Desktop Build" \
            --notes "Auto-generated desktop packages from commit ${{ github.sha }}. Version: ${{ env.CONTINUOUS_VERSION }}. Updated on every push to main." \
            --prerelease

      - name: Remove old release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t asset_ids < <(gh api repos/${{ github.repository }}/releases/tags/continuous --jq '.assets[].id')
          if [ ${#asset_ids[@]} -eq 0 ]; then
            echo "No previous assets to delete."
            exit 0
          fi
          for id in "${asset_ids[@]}"; do
            echo "Deleting old asset id: $id"
            gh api -X DELETE repos/${{ github.repository }}/releases/assets/$id
          done

      - name: Upload assets to continuous release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Downloaded assets:"
          ls -la release-assets || true
          echo "Installer files to upload:"
          find release-assets -type f \( \
            -name "*.exe" -o \
            -name "*.zip" -o \
            -name "*.dmg" -o \
            -name "*.AppImage" -o \
            -name "*.deb" -o \
            -name "*.tar.gz" -o \
            -name "*.yml" -o \
            -name "*.blockmap" \
          \) -print

          upload_count=0
          while IFS= read -r file; do
            upload_count=$((upload_count + 1))
            echo "Uploading: $file"
            gh release upload continuous "$file" -R ${{ github.repository }} --clobber
          done < <(find release-assets -type f \( \
            -name "*.exe" -o \
            -name "*.zip" -o \
            -name "*.dmg" -o \
            -name "*.AppImage" -o \
            -name "*.deb" -o \
            -name "*.tar.gz" -o \
            -name "*.yml" -o \
            -name "*.blockmap" \
          \) | sort)

          if [ "$upload_count" -eq 0 ]; then
            echo "No release assets found to upload."
            exit 1
          fi
