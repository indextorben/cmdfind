<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cmdfind Desktop</title>
    <style>
      :root {
        --bg: #0b1020;
        --bg-soft: #121a32;
        --panel: rgba(15, 23, 43, 0.82);
        --panel-solid: #151f3d;
        --line: rgba(154, 177, 230, 0.24);
        --line-strong: rgba(154, 177, 230, 0.44);
        --text: #edf3ff;
        --muted: #a8b8df;
        --primary: #6ca5ff;
        --primary-strong: #4f8fff;
        --ok: #55d79d;
        --radius: 14px;
        --radius-sm: 10px;
        --shadow: 0 20px 44px rgba(5, 9, 20, 0.48);
      }

      * { box-sizing: border-box; }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: "JetBrains Mono", "Fira Code", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        color: var(--text);
        background:
          radial-gradient(1000px 520px at -10% -20%, #25335f 0%, transparent 60%),
          radial-gradient(1000px 520px at 110% -30%, #2b2148 0%, transparent 64%),
          linear-gradient(180deg, #0a1020, #090e1b 45%, #080d19);
      }

      .wrap {
        width: min(1200px, calc(100% - 44px));
        margin: 28px auto 34px;
      }

      .hero {
        border: 1px solid var(--line);
        border-radius: calc(var(--radius) + 4px);
        background:
          linear-gradient(165deg, rgba(28, 39, 73, 0.74), rgba(13, 20, 38, 0.92)),
          radial-gradient(900px 280px at 10% 0%, rgba(108, 165, 255, 0.2), transparent 66%);
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
        padding: 22px;
      }

      .title {
        margin: 0 0 6px;
        font-size: 28px;
        letter-spacing: -0.02em;
        font-weight: 800;
        color: #f4f7ff;
      }

      .subtitle {
        margin: 0 0 18px;
        color: var(--muted);
        font-size: 14px;
      }

      .controls {
        display: grid;
        grid-template-columns: 2fr 1fr 1fr 1fr 0.8fr auto auto;
        gap: 10px;
      }

      input,
      select,
      button {
        border: 1px solid var(--line);
        background: rgba(13, 20, 38, 0.88);
        color: var(--text);
        border-radius: var(--radius-sm);
        padding: 11px 12px;
        font: inherit;
        font-size: 13px;
      }

      input::placeholder {
        color: #8799c7;
      }

      input:focus,
      select:focus {
        outline: none;
        border-color: var(--line-strong);
        box-shadow: 0 0 0 3px rgba(108, 165, 255, 0.2);
      }

      button {
        cursor: pointer;
        font-weight: 700;
        transition: transform 160ms ease, filter 160ms ease, background 160ms ease;
      }

      button:hover {
        transform: translateY(-1px);
        filter: brightness(1.05);
      }

      button:active {
        transform: translateY(0);
      }

      #searchBtn {
        background: linear-gradient(145deg, #5f98ff, #4a84ef);
        border: 1px solid rgba(165, 193, 255, 0.45);
        color: #f5f9ff;
      }

      #allBtn,
      #saveLangBtn,
      .copy-btn {
        background: linear-gradient(145deg, #22345e, #1a294d);
        border: 1px solid rgba(149, 176, 231, 0.34);
        color: #dce8ff;
      }

      .row {
        margin-top: 14px;
        display: flex;
        gap: 14px;
        align-items: center;
        flex-wrap: wrap;
        color: var(--muted);
        font-size: 13px;
      }

      label {
        display: inline-flex;
        gap: 7px;
        align-items: center;
      }

      input[type="checkbox"] {
        width: 14px;
        height: 14px;
        accent-color: var(--primary);
      }

      .status {
        margin-top: 12px;
        min-height: 18px;
        color: var(--ok);
        font-size: 13px;
      }

      .results {
        margin-top: 16px;
        display: grid;
        gap: 12px;
      }

      .card {
        background:
          linear-gradient(160deg, rgba(26, 38, 69, 0.78), rgba(14, 21, 41, 0.9));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 13px;
        box-shadow: 0 14px 26px rgba(5, 9, 20, 0.34);
      }

      .head {
        color: #eff4ff;
        font-weight: 700;
      }

      .idx {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 23px;
        height: 23px;
        border-radius: 999px;
        background: #22345f;
        color: #d7e4ff;
        margin-right: 8px;
      }

      .command-row {
        margin-top: 9px;
        display: flex;
        gap: 8px;
        align-items: stretch;
      }

      .command {
        font-size: 14px;
        color: #f4f7ff;
        background: rgba(9, 14, 28, 0.85);
        border: 1px solid rgba(150, 178, 233, 0.3);
        border-radius: 9px;
        padding: 10px;
        flex: 1;
      }

      .copy-btn {
        min-width: 94px;
        border-radius: 9px;
      }

      .note {
        margin-top: 8px;
        color: #cfdaf5;
      }

      .meta {
        margin-top: 7px;
        color: var(--muted);
        font-size: 12px;
      }

      .empty {
        border: 1px dashed rgba(149, 176, 231, 0.4);
        border-radius: var(--radius-sm);
        background: rgba(17, 25, 48, 0.5);
        padding: 16px;
        color: var(--muted);
      }

      @media (max-width: 1120px) {
        .controls {
          grid-template-columns: 1.2fr 1fr 1fr 1fr;
        }
      }

      @media (max-width: 820px) {
        .wrap {
          width: min(1200px, calc(100% - 24px));
          margin-top: 18px;
        }

        .hero {
          padding: 16px;
        }

        .title {
          font-size: 22px;
        }

        .controls {
          grid-template-columns: 1fr 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="hero">
        <h1 class="title">cmdfind desktop</h1>
        <p class="subtitle">Finde passende Befehle schneller und mit klarerer Oberfläche.</p>

        <div class="controls">
          <input id="query" type="text" placeholder="Search command... e.g. process on port 3000" />
          <select id="lang">
            <option value="auto">lang:auto</option>
            <option value="de">lang:de</option>
            <option value="en">lang:en</option>
          </select>
          <select id="platform">
            <option value="auto">platform:auto</option>
            <option value="windows">windows</option>
            <option value="linux">linux</option>
            <option value="macos">macos</option>
          </select>
          <select id="shell">
            <option value="auto">shell:auto</option>
            <option value="powershell">powershell</option>
            <option value="bash">bash</option>
            <option value="zsh">zsh</option>
          </select>
          <input id="limit" type="number" min="1" value="20" />
          <button id="searchBtn">Search</button>
          <button id="allBtn" class="secondary">All Local</button>
        </div>

        <div class="row">
          <label><input id="context" type="checkbox" checked /> prefer current context</label>
          <label><input id="refresh" type="checkbox" /> refresh local index</label>
          <label><input id="disableLocal" type="checkbox" /> disable local index</label>
          <button id="saveLangBtn" class="secondary">Save default language</button>
        </div>

        <div id="status" class="status"></div>
      </section>

      <section id="results" class="results"></section>
    </div>

    <script type="module" src="./renderer.js"></script>
  </body>
</html>
