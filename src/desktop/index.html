<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cmdfind Desktop</title>
    <style>
      :root {
        --bg: #090d16;
        --panel: #10182a;
        --panel2: #131f35;
        --text: #d9e2ff;
        --muted: #8da2d1;
        --accent: #46d7ff;
        --accent2: #9bff66;
        --danger: #ff6b6b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "JetBrains Mono", "Fira Code", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        background: radial-gradient(1200px 600px at 20% -20%, #1a2f58 0%, var(--bg) 50%), var(--bg);
        color: var(--text);
      }
      .wrap { max-width: 1100px; margin: 0 auto; padding: 20px; }
      .hero {
        background: linear-gradient(145deg, #111c30, #0e1728);
        border: 1px solid #26385d;
        border-radius: 14px;
        padding: 16px;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
      }
      .title {
        color: var(--accent2);
        font-size: 24px;
        font-weight: 800;
        margin: 0 0 12px;
      }
      .controls {
        display: grid;
        grid-template-columns: 1.8fr repeat(4, 1fr) auto auto;
        gap: 8px;
      }
      input, select, button {
        border: 1px solid #2b3d64;
        background: var(--panel);
        color: var(--text);
        border-radius: 10px;
        padding: 10px;
        font: inherit;
      }
      input:focus, select:focus { outline: 2px solid #294f9f; }
      button {
        cursor: pointer;
        background: linear-gradient(140deg, #1e5fc9, #2a91ee);
        border: none;
        font-weight: 700;
      }
      button.secondary { background: linear-gradient(140deg, #4d7d2b, #78ae42); }
      .row {
        margin-top: 10px;
        display: flex;
        gap: 14px;
        align-items: center;
        color: var(--muted);
        flex-wrap: wrap;
      }
      label { display: inline-flex; gap: 6px; align-items: center; }
      .status { margin-top: 10px; color: var(--accent); }
      .results { margin-top: 14px; display: grid; gap: 10px; }
      .card {
        background: linear-gradient(145deg, var(--panel2), #0f1a2f);
        border: 1px solid #24395e;
        border-radius: 12px;
        padding: 12px;
      }
      .head { color: var(--accent2); font-weight: 700; }
      .idx {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 22px;
        height: 22px;
        border-radius: 999px;
        background: #1b315b;
        color: #b8ceff;
        margin-right: 8px;
      }
      .command {
        font-size: 16px;
        color: #fff;
        background: #0a1324;
        border: 1px solid #2d4775;
        border-radius: 8px;
        padding: 8px;
        flex: 1;
      }
      .command-row {
        margin-top: 8px;
        display: flex;
        gap: 8px;
        align-items: stretch;
      }
      .copy-btn {
        min-width: 86px;
        border-radius: 8px;
        border: 1px solid #2b3d64;
        background: linear-gradient(145deg, #2b3f67, #2d4f83);
        color: #dce8ff;
        font-weight: 700;
        cursor: pointer;
      }
      .note { margin-top: 8px; color: #c6d4f6; }
      .meta { margin-top: 6px; color: var(--muted); font-size: 13px; }
      .empty {
        border: 1px dashed #32548b;
        border-radius: 10px;
        padding: 16px;
        color: var(--muted);
      }
      @media (max-width: 980px) {
        .controls { grid-template-columns: 1fr 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="hero">
        <h1 class="title">cmdfind desktop</h1>
        <div class="controls">
          <input id="query" type="text" placeholder="Search command... e.g. process on port 3000" />
          <select id="lang">
            <option value="auto">lang:auto</option>
            <option value="de">lang:de</option>
            <option value="en">lang:en</option>
          </select>
          <select id="platform">
            <option value="auto">platform:auto</option>
            <option value="windows">windows</option>
            <option value="linux">linux</option>
            <option value="macos">macos</option>
          </select>
          <select id="shell">
            <option value="auto">shell:auto</option>
            <option value="powershell">powershell</option>
            <option value="bash">bash</option>
            <option value="zsh">zsh</option>
          </select>
          <input id="limit" type="number" min="1" value="20" />
          <button id="searchBtn">Search</button>
          <button id="allBtn" class="secondary">All Local</button>
        </div>
        <div class="row">
          <label><input id="context" type="checkbox" checked /> prefer current context</label>
          <label><input id="refresh" type="checkbox" /> refresh local index</label>
          <label><input id="disableLocal" type="checkbox" /> disable local index</label>
          <button id="saveLangBtn" class="secondary">Save default language</button>
        </div>
        <div id="status" class="status"></div>
      </section>

      <section id="results" class="results"></section>
    </div>

    <script type="module" src="./renderer.js"></script>
  </body>
</html>
