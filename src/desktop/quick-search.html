<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cmdfind quick search</title>
    <style>
      :root {
        --panel: rgba(13, 21, 42, 0.96);
        --line: rgba(149, 174, 232, 0.25);
        --line-strong: rgba(149, 174, 232, 0.45);
        --text: #edf3ff;
        --muted: #a8b8df;
        --ok: #55d79d;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "JetBrains Mono", "Fira Code", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        color: var(--text);
        background:
          radial-gradient(900px 440px at 0% 0%, rgba(78, 112, 196, 0.22), transparent 62%),
          radial-gradient(900px 440px at 100% 0%, rgba(90, 52, 150, 0.16), transparent 62%),
          linear-gradient(180deg, #0a0f1b 0%, #070c16 100%);
        padding: 14px;
      }

      .panel {
        height: calc(100vh - 28px);
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--panel);
        box-shadow: 0 16px 36px rgba(3, 8, 18, 0.55);
        display: grid;
        grid-template-rows: auto auto 1fr;
        overflow: hidden;
      }

      .head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px 8px;
        border-bottom: 1px solid var(--line);
      }

      .title {
        margin: 0;
        font-size: 13px;
        letter-spacing: 0.02em;
        color: #d8e5ff;
      }

      .hint {
        font-size: 11px;
        color: var(--muted);
      }

      .search {
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
      }

      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: rgba(9, 14, 30, 0.92);
        color: var(--text);
        padding: 12px;
        font: inherit;
        font-size: 15px;
      }

      input::placeholder { color: #8ca0d4; }

      input:focus {
        outline: none;
        border-color: var(--line-strong);
        box-shadow: 0 0 0 3px rgba(108, 165, 255, 0.22);
      }

      .results {
        overflow: auto;
        padding: 10px 12px 14px;
        display: grid;
        gap: 8px;
      }

      .result {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px;
        background: rgba(11, 17, 34, 0.9);
      }

      .result:hover {
        border-color: var(--line-strong);
      }

      .task {
        font-size: 12px;
        color: #bbcaf0;
        margin-bottom: 6px;
      }

      .command {
        font-size: 14px;
        color: #f5f9ff;
        word-break: break-word;
      }

      .meta {
        margin-top: 6px;
        font-size: 11px;
        color: #8ea2d4;
      }

      .status {
        font-size: 12px;
        color: var(--muted);
      }

      .ok { color: var(--ok); }

      .empty {
        border: 1px dashed var(--line);
        border-radius: 10px;
        padding: 16px;
        color: var(--muted);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <div class="head">
        <h1 class="title">cmdfind Quick Search</h1>
        <span class="hint">Enter = suchen, ESC = schließen</span>
      </div>
      <div class="search">
        <input id="quickQuery" type="text" placeholder="Befehl suchen... z. B. ping, find file, port 3000" autocomplete="off" />
      </div>
      <section id="quickResults" class="results">
        <div class="empty">Tippe einen Suchbegriff und drücke Enter.</div>
      </section>
    </main>
    <script type="module" src="./quick-renderer.js"></script>
  </body>
</html>
